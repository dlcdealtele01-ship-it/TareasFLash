    <dialog id="modalForm" class="rounded-[2rem] p-8 w-full max-w-sm border-none relative overflow-visible">
        <button onclick="this.closest('dialog').close()" class="absolute top-6 right-6 text-slate-300"><i class="ph-bold ph-x text-xl"></i></button>
        <h3 id="formTitle" class="font-black mb-6 uppercase italic text-xl text-center text-slate-800">Datos Préstamo</h3>
        <div class="space-y-4">
            <div class="relative"><label>Cliente</label><input type="text" id="formNombre" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none" placeholder="Nombre" oninput="buscarClientesExistentes(this.value)"><div id="listaSugerenciasClientes" class="hidden absolute z-[100] w-full mt-1 bg-white border rounded-2xl shadow-2xl max-h-48 overflow-y-auto"></div><input type="hidden" id="formClienteId"></div>
            <div><label>Monto</label><input type="number" id="formMonto" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"></div>
            
            <div>
                <label>Fecha de Inicio (Opcional)</label>
                <input type="date" id="formFechaManual" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none text-sm">
                <p class="text-[8px] text-slate-400 mt-1 ml-2 uppercase italic">Si se deja vacío, usará la fecha de hoy.</p>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div><label>Interés %</label><select id="formTasa" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"><option value="5">5%</option><option value="10">10%</option><option value="15">15%</option><option value="20" selected>20%</option></select></div>
                <div><label>Gracia (Días)</label><input type="number" id="formGracia" value="0" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"></div>
            </div>
            <button onclick="guardarPrestamo()" class="w-full p-5 bg-emerald-600 text-white rounded-2xl font-black uppercase shadow-lg active:scale-95 transition">Guardar</button>
        </div>

        <button onclick="this.closest('dialog').close()" class="absolute top-6 right-6 text-slate-300"><i class="ph-bold ph-x text-xl"></i></button>
        <h3 id="pagoTitle" class="font-black uppercase mb-4 italic text-slate-400 text-[10px]">Registrar Pago</h3>
        <div class="space-y-4 mb-6 text-left">

            <div class="flex items-center justify-center gap-2"><input type="checkbox" id="checkTodoCapital" class="accent-slate-900"><span class="text-[10px] font-black uppercase text-slate-400">100% Capital</span></div>
            <input type="number" id="montoPago" placeholder="0.00" class="w-full p-5 bg-slate-100 rounded-2xl font-black text-3xl text-center outline-none">

    <dialog id="modalReciboImagen" class="rounded-[2.5rem] p-0 border-none overflow-hidden text-center relative">

            <div class="bg-white p-8 rounded-3xl shadow-xl w-80 text-left border border-slate-100">
                <div class="text-center mb-6"><h2 id="reciboCliente" class="text-xl font-black uppercase italic text-slate-900"></h2></div>
                <div class="space-y-3 border-y py-4 border-dashed border-slate-200 text-sm">
                    <div class="flex justify-between"><span>MONTO</span><span id="reciboMonto" class="font-black text-emerald-600"></span></div>
                    <div class="flex justify-between"><span>SALDO</span><span id="reciboSaldo" class="font-black text-slate-900"></span></div>
                </div>

        </div>
        <div class="p-6 bg-white"><button onclick="this.closest('dialog').close()" class="w-full text-[10px] font-black text-slate-300 uppercase">Cerrar</button></div>

    <script>
        let currentUser = null, idCarteraActual = null, pActivo = null, modoEdicionForm = false, idPagoAEditar = null, tabActual = 'activos', isSignUpMode = false;

        async function init() {
            _supabase.auth.onAuthStateChange(async (event, session) => {
                if (session) {
                    currentUser = session.user;
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    await cargarCarteras();
                } else {
                    document.getElementById('authScreen').classList.remove('hidden');
                    document.getElementById('mainApp').classList.add('hidden');
                }
            });
        }

        // LÓGICA DE MOROSIDAD PRO (MEJORADA)
        function verificarMoraPro(p) {
            const hoy = new Date();
            const fCreacion = new Date(p.created_at);
            const dGracia = parseInt(p.dias_gracia || 0);
            const diaHoy = hoy.getDate();

            // Si el préstamo es del futuro, no hay mora
            if (fCreacion > hoy) return false;

            const limite15 = 15 + dGracia;
            const limite30 = 30 + dGracia;

            // Determinamos qué corte estamos evaluando hoy
            // Si hoy es antes del 15+gracia, evaluamos si pagó el ciclo anterior (16 al 30/31 del mes pasado)
            // Pero para simplificar y ver el efecto ahora:
            let diaCorteRequerido = 0;
            if (diaHoy > limite30) diaCorteRequerido = 16;
            else if (diaHoy > limite15) diaCorteRequerido = 1;
            else {
                // Si hoy es día 5 de Abril, y el préstamo es de Marzo,
                // técnicamente ya debería haber pagado los cortes de Marzo.
                // Si no hay pagos en absoluto, es moroso.
                if (fCreacion.getUTCMonth() < hoy.getUTCMonth() || fCreacion.getUTCFullYear() < hoy.getUTCFullYear()) {
                   // Si es un préstamo viejo, al menos debería tener un pago este mes o el pasado.
                   // Para propósitos de este test, exigiremos que tenga un pago en el mes actual si ya pasaron cortes previos.
                   return !p.pagos?.some(pg => {
                       const fp = new Date(pg.fecha_pago);
                       return fp.getUTCMonth() === hoy.getUTCMonth();
                   });
                }
                return false;
            }

            const tienePagoCorte = p.pagos?.some(pg => {
                const fp = new Date(pg.fecha_pago);
                return fp.getUTCMonth() === hoy.getUTCMonth() && 
                       fp.getUTCFullYear() === hoy.getUTCFullYear() &&
                       fp.getUTCDate() >= diaCorteRequerido;
            });

            return !tienePagoCorte;
        }

        async function cargarDatos() {
            if (!idCarteraActual) return;
            const { data: prestamos } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('cartera_id', idCarteraActual);
            const tbody = document.getElementById('listaPrestamos'); tbody.innerHTML = '';
            let tCap = 0, tInt = 0;

            prestamos?.forEach(p => {
                const calc = calcularSaldo(p);
                const esFin = calc.capital <= 0.05;
                if(!esFin) { tCap += calc.capital; tInt += calc.interes; }
                
                if ((tabActual === 'activos' && !esFin) || (tabActual === 'finalizados' && esFin)) {
                    const mora = !esFin ? verificarMoraPro(p) : false;
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50 cursor-pointer" onclick="verHistorial('${p.id}')">
                            <td class="p-4 md:p-6">
                                ${mora ? `<span class="badge-mora bg-red-100 text-red-600 text-[8px] font-black px-2 py-0.5 rounded-full block w-fit mb-1 uppercase">Mora</span>` : ''}
                                <div class="font-black uppercase text-[11px] md:text-sm text-slate-700">${p.clientes.nombre}</div>
                            </td>
                            <td class="p-4 md:p-6 text-right">
                                <div class="font-black text-sm md:text-lg">$${calc.capital.toFixed(2)}</div>
                                <div class="text-[8px] md:text-[10px] text-emerald-500 font-black">${esFin ? 'PAGADO' : '+$' + calc.interes.toFixed(2)}</div>
                            </td>
                            <td class="p-4 md:p-6 text-center" onclick="event.stopPropagation()">
                                ${!esFin ? `<button onclick="abrirModalPago('${p.id}')" class="w-10 h-10 bg-emerald-500 text-white rounded-xl mx-auto flex items-center justify-center"><i class="ph-bold ph-hand-coins"></i></button>` : `<i class="ph-bold ph-check-circle text-emerald-500 text-2xl"></i>`}
                            </td>
                        </tr>`;
                }
            });
            totalCapital.innerText = `$${tCap.toFixed(2)}`; totalIntereses.innerText = `$${tInt.toFixed(2)}`;
        }

        async function guardarPrestamo() { 
            const cid = document.getElementById('formClienteId').value, nom = document.getElementById('formNombre').value, mon = parseFloat(formMonto.value);
            const fechaManual = document.getElementById('formFechaManual').value;
            if (!nom || !mon) return;

            if(modoEdicionForm) { 
                await _supabase.from('clientes').update({ nombre: nom }).eq('id', pActivo.cliente_id); 
                await _supabase.from('prestamos').update({ monto_prestado: mon, tasa_interes: parseInt(formTasa.value), dias_gracia: parseInt(formGracia.value) }).eq('id', pActivo.id); 
                modalForm.close(); verHistorial(pActivo.id); 
            } else { 
                let finalId = cid;
                if (!finalId) { 
                    const { data: cl } = await _supabase.from('clientes').insert([{ nombre: nom, user_id: currentUser.id, cartera_id: idCarteraActual }]).select().single(); 
                    if (cl) finalId = cl.id; 
                }
                const pld = { cliente_id: finalId, cartera_id: idCarteraActual, user_id: currentUser.id, monto_prestado: mon, tasa_interes: parseInt(formTasa.value), dias_gracia: parseInt(formGracia.value) };
                if (fechaManual) pld.created_at = fechaManual;
                
                await _supabase.from('prestamos').insert([pld]);
                modalForm.close(); cargarDatos(); 
            } 
        }

        // FUNCIONES AUXILIARES (Sin cambios para mantener estabilidad)
        function calcularSaldo(p) { 
            let cap = parseFloat(p.monto_prestado), tasa = (p.tasa_interes || 0) / 100; 
            const pagos = (p.pagos || []).sort((a,b) => new Date(a.fecha_pago) - new Date(b.fecha_pago));
            pagos.forEach(pg => { 
                const m = parseFloat(pg.monto_pagado); 
                if (pg.aplicar_interes) { const i = cap * tasa; if (m >= i) cap -= (m - i); else cap += (i - m); } else cap -= m;
            }); 
            return { capital: Math.max(0, cap), interes: Math.max(0, cap * tasa) }; 
        }

        async function cargarCarteras() {
            const { data: carteras } = await _supabase.from('carteras').select('*');
            if (carteras?.length) {
                idCarteraActual = carteras[0].id;
                document.getElementById('selectCartera').innerHTML = carteras.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
                cargarDatos();
            }
        }

        async function processAuth() {
            const email = authEmail.value, password = authPassword.value;
            if (isSignUpMode) {
                await _supabase.auth.signUp({ email, password, options: { data: { full_name: authName.value } } });
                alert("Registrado"); toggleAuthMode();
            } else {
                const { error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) authError.innerText = "Error de acceso";
            }
        }

        function toggleAuthMode() { isSignUpMode = !isSignUpMode; document.getElementById('container-name').classList.toggle('hidden'); }
        async function handleLogout() { await _supabase.auth.signOut(); }
        function abrirModalNuevo() { modoEdicionForm = false; formNombre.value = ''; formMonto.value = ''; formFechaManual.value = ''; modalForm.showModal(); }
        function abrirModalPago(id) { pActivo = {id}; montoPago.value = ''; fechaPago.value = new Date().toISOString().split('T')[0]; modalPago.showModal(); }
        async function confirmarPago() { 
            const m = parseFloat(montoPago.value), f = fechaPago.value; 
            const ai = !document.getElementById('checkTodoCapital').checked;
            await _supabase.from('pagos').insert([{ monto_pagado: m, fecha_pago: f, aplicar_interes: ai, prestamo_id: pActivo.id, user_id: currentUser.id }]);
            modalPago.close(); cargarDatos(); 
        }
        function filtrarTab(t) { tabActual = t; cargarDatos(); }
        async function verHistorial(id) { 
            const { data: p } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('id', id).single(); 
            pActivo = p; const c = calcularSaldo(p);
            viewDashboard.classList.add('hidden'); viewHistorial.classList.remove('hidden');
            histNombre.innerText = p.clientes.nombre; histSaldo.innerText = `$${c.capital.toFixed(2)}`;
            listaPagosHistorial.innerHTML = p.pagos.map(pg => `<div class="bg-white p-4 rounded-2xl border flex justify-between"><span>${pg.fecha_pago}</span><b>$${pg.monto_pagado}</b></div>`).join('');
        }
        function cerrarHistorial() { viewHistorial.classList.add('hidden'); viewDashboard.classList.remove('hidden'); }
        window.onload = init;
    </script>
</body>
