<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tareas Flash | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --flash-blue: #57b6e5; --flash-yellow: #f9b233; }
        .text-flash-blue { color: var(--flash-blue); }
        .bg-flash-blue { background-color: var(--flash-blue); }
        .header-logo { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--flash-yellow); }
        
        /* Contenedor Jitsi 100% Móvil */
        .jitsi-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 180px); /* Ajuste dinámico para el alto del celular */
            min-height: 500px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        .hidden-section { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2" onclick="location.reload()" class="cursor-pointer">
                <img src="logos.jpeg" alt="Logo" class="header-logo" onerror="this.src='https://ui-avatars.com/api/?name=TF'">
                <span class="font-black text-lg tracking-tighter italic">TAREAS <span class="text-[--flash-yellow]">FLASH</span></span>
            </div>
            
            <button id="menu-btn" class="md:hidden text-2xl p-2"><i class="fas fa-bars"></i></button>

            <div class="hidden md:flex space-x-6 items-center font-bold text-xs uppercase">
                <a href="#" onclick="showSection('inicio-web')" class="hover:text-flash-blue">Inicio</a>
                <a href="#" onclick="showSection('login-section')" class="bg-slate-100 px-4 py-2 rounded-lg">Acceso Tutor</a>
            </div>
        </div>

        <div id="mobile-menu" class="hidden bg-white border-t p-6 flex flex-col space-y-4 font-bold uppercase text-xs">
            <a href="#" onclick="showSection('inicio-web')">Inicio</a>
            <a href="#" onclick="showSection('login-section')" class="text-flash-blue">Panel Tutor</a>
        </div>
    </nav>

    <main id="inicio-web" class="section-content py-12 px-6 text-center">
        <h1 class="text-5xl font-black mb-6 leading-tight">Tu éxito escolar a <br><span class="text-flash-blue">velocidad Flash</span></h1>
        <p class="text-slate-500 max-w-md mx-auto mb-10">Plataforma educativa para tutores y estudiantes en Panamá.</p>
        <button onclick="showSection('login-section')" class="bg-flash-blue text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-blue-200">ENTRAR AL PANEL</button>
    </main>

    <section id="login-section" class="section-content hidden-section py-12 px-4">
        <div class="max-w-sm mx-auto bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-black text-center mb-2">Panel Tutor</h2>
            <p class="text-center text-slate-400 text-sm mb-8">Ingresa tus datos de acceso</p>
            
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase ml-2">Usuario</label>
                    <input type="text" id="user" placeholder="admin" class="w-full bg-slate-50 p-4 rounded-xl border-2 border-transparent focus:border-flash-blue outline-none" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase ml-2">Contraseña</label>
                    <input type="password" id="pass" placeholder="••••••••" class="w-full bg-slate-50 p-4 rounded-xl border-2 border-transparent focus:border-flash-blue outline-none" required>
                </div>
                <div id="error-msg" class="hidden text-red-500 text-xs font-bold text-center">Credenciales incorrectas</div>
                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black mt-4">INGRESAR</button>
            </form>
        </div>
    </section>

    <section id="tutor-panel" class="section-content hidden-section p-4">
        <div class="flex justify-between items-center mb-4 bg-white p-4 rounded-2xl shadow-sm">
            <div>
                <span class="text-[10px] font-bold text-flash-blue uppercase">Sesión Activa</span>
                <h2 class="text-lg font-black leading-none">Panel de Tutoría</h2>
            </div>
            <button onclick="location.reload()" class="bg-red-50 text-red-500 p-2 rounded-lg text-xs font-bold uppercase">Salir</button>
        </div>

        <div class="jitsi-container shadow-2xl">
            <iframe 
                src="https://meet.jit.si/TareasFlashPanamaSala1" 
                allow="camera; microphone; fullscreen; display-capture; autoplay" 
                id="jitsiFrame">
            </iframe>
        </div>
    </section>

    <script>
        // Función para cambiar de sección
        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.getElementById('mobile-menu').classList.add('hidden');
            window.scrollTo(0,0);
        }

        // VALIDACIÓN DE LOGIN
        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const error = document.getElementById('error-msg');

            // --- TUS CREDENCIALES AQUÍ ---
            if (user === "admin" && pass === "FLASH2026") {
                error.classList.add('hidden');
                showSection('tutor-panel');
            } else {
                error.classList.remove('hidden');
                // Vibración de error en móviles si el navegador lo permite
                if (navigator.vibrate) navigator.vibrate(200);
            }
        });

        // Botón Menú Móvil
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
    </script>

</body>
</html>
