<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas Flash | Tutorías en Panamá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --flash-blue: #57b6e5;
            --flash-yellow: #f9b233;
        }
        .bg-flash-blue { background-color: var(--flash-blue); }
        .text-flash-blue { color: var(--flash-blue); }
        .text-flash-yellow { color: var(--flash-yellow); }
        
        .img-placeholder { background-color: #e2e8f0; position: relative; overflow: hidden; }
        
        .header-logo {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--flash-yellow);
        }

        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(87, 182, 229, 0.6);
        }

        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

<nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="img-placeholder rounded-full">
                <img src="logos.jpeg" class="header-logo">
            </div>
            <div class="leading-none">
                <span class="text-xl font-black text-flash-blue">TAREAS</span><br>
                <span class="text-xl font-black text-flash-yellow pl-4">FLASH</span>
            </div>
        </div>
    </div>
</nav>

<section id="contacto" class="py-24">
    <div class="container mx-auto px-6">
        <div class="max-w-5xl mx-auto bg-white rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border">

            <!-- PANEL (oculto en móvil) -->
            <div class="hidden md:block md:w-2/5 bg-slate-900 p-12 text-white">
                <h2 class="text-4xl font-black mb-8">Solicita tu cupo hoy</h2>
                <p class="text-slate-400 mb-10">Déjanos los datos del estudiante.</p>
            </div>

            <!-- FORM -->
            <div class="w-full md:w-3/5 p-10 md:p-16">
                <form id="tutoriaForm" class="grid gap-6">
                    
                    <input type="text" id="nombre" placeholder="Nombre" class="p-4 bg-slate-100 rounded-xl" required>
                    <input type="tel" id="telefono" placeholder="WhatsApp" class="p-4 bg-slate-100 rounded-xl" required>
                    <input type="text" id="grado" placeholder="Grado" class="p-4 bg-slate-100 rounded-xl" required>
                    <input type="text" id="materia" placeholder="Materia" class="p-4 bg-slate-100 rounded-xl" required>

                    <button class="bg-green-500 text-white py-4 rounded-xl">
                        Enviar a WhatsApp
                    </button>

                </form>
            </div>

        </div>
    </div>
</section>

<script>
document.getElementById('tutoriaForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const numero = "50760000000";

    const nombre = document.getElementById('nombre').value;
    const telefono = document.getElementById('telefono').value;
    const grado = document.getElementById('grado').value;
    const materia = document.getElementById('materia').value;

    const mensaje = `Nueva solicitud:\n${nombre}\n${grado}\n${materia}\n${telefono}`;

    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
});
</script>

</body>
</html>
