    <script>
        let currentUser = null, idCarteraActual = null, pActivo = null, modoEdicionForm = false, idPagoAEditar = null, tabActual = 'activos', isSignUpMode = false, timeoutBusqueda = null;

        async function init() {
            _supabase.auth.onAuthStateChange(async (event, session) => {
                if (session) {
                    currentUser = session.user;
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    await cargarCarteras();
                } else {
                    document.getElementById('authScreen').classList.remove('hidden');
                    document.getElementById('mainApp').classList.add('hidden');
                }
            });
        }

        function verificarMoraCorrecta(p) {
            const hoy = new Date();
            const fCreacion = new Date(p.created_at);
            const dGracia = parseInt(p.dias_gracia || 0);
            const diaHoy = hoy.getDate();

            // Si es del futuro, no hay mora
            if (fCreacion > hoy) return false;

            const limite15 = 15 + dGracia;
            const limite30 = 30 + dGracia;

            let diaCorteRequerido = 0;
            // Si el préstamo es de un mes anterior o más, ya debería tener pagos
            const esMesPasado = hoy.getUTCMonth() > fCreacion.getUTCMonth() || hoy.getUTCFullYear() > fCreacion.getUTCFullYear();

            if (diaHoy > limite30) diaCorteRequerido = 16;
            else if (diaHoy > limite15) diaCorteRequerido = 1;
            else if (esMesPasado) {
                // Si estamos a día 5 (ejemplo) pero el préstamo es de Marzo,
                // verificamos si pagó el último corte del mes pasado (16-30).
                // Pero para ser estrictos con el "Abono Actual":
                return !p.pagos?.some(pg => {
                    const fp = new Date(pg.fecha_pago);
                    return fp.getUTCMonth() === hoy.getUTCMonth();
                });
            }

            if (diaCorteRequerido === 0) return false;

            const tienePago = p.pagos?.some(pg => {
                const fp = new Date(pg.fecha_pago);
                return fp.getUTCMonth() === hoy.getUTCMonth() && fp.getUTCFullYear() === hoy.getUTCFullYear() && fp.getUTCDate() >= diaCorteRequerido;
            });
            return !tienePago;
        }

        async function cargarDatos() {
            if (!idCarteraActual) return;
            const { data: prestamos } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('cartera_id', idCarteraActual);
            const tbody = document.getElementById('listaPrestamos'); tbody.innerHTML = '';
            let tCap = 0, tInt = 0;

            prestamos?.forEach(p => {
                const calc = calcularSaldo(p);
                const esFin = calc.capital <= 0.05;
                if(!esFin) { tCap += calc.capital; tInt += calc.interes; }
                
                if ((tabActual === 'activos' && !esFin) || (tabActual === 'finalizados' && esFin)) {
                    const mora = !esFin ? verificarMoraCorrecta(p) : false;
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50 cursor-pointer" onclick="verHistorial('${p.id}')">
                            <td class="p-4 md:p-6">
                                ${mora ? `<span class="badge-mora bg-red-100 text-red-600 text-[8px] font-black px-2 py-0.5 rounded-full block w-fit mb-1 uppercase">Mora</span>` : ''}
                                <div class="font-black uppercase text-[11px] md:text-sm text-slate-700">${p.clientes.nombre}</div>
                            </td>
                            <td class="p-4 md:p-6 text-right">
                                <div class="font-black text-sm md:text-lg">$${calc.capital.toFixed(2)}</div>
                                <div class="text-[8px] md:text-[10px] text-emerald-500 font-black">${esFin ? 'PAGADO' : '+$' + calc.interes.toFixed(2)}</div>
                            </td>
                            <td class="p-4 md:p-6 text-center" onclick="event.stopPropagation()">
                                ${!esFin ? `<button onclick="abrirModalPago('${p.id}')" class="w-10 h-10 bg-emerald-500 text-white rounded-xl mx-auto flex items-center justify-center"><i class="ph-bold ph-hand-coins"></i></button>` : `<i class="ph-bold ph-check-circle text-emerald-500 text-2xl"></i>`}
                            </td>
                        </tr>`;
                }
            });
            totalCapital.innerText = `$${tCap.toFixed(2)}`; totalIntereses.innerText = `$${tInt.toFixed(2)}`;
        }

        function calcularSaldo(p) { 
            let cap = parseFloat(p.monto_prestado), tasa = (p.tasa_interes || 0) / 100; 
            const pagos = (p.pagos || []).sort((a,b) => new Date(a.fecha_pago) - new Date(b.fecha_pago));
            pagos.forEach(pg => { 
                const m = parseFloat(pg.monto_pagado); 
                if (pg.aplicar_interes) { const i = cap * tasa; if (m >= i) cap -= (m - i); else cap += (i - m); } else cap -= m;
            }); 
            return { capital: Math.max(0, cap), interes: Math.max(0, cap * tasa) }; 
        }

        async function guardarPrestamo() { 
            const cid = document.getElementById('formClienteId').value, nom = document.getElementById('formNombre').value, mon = parseFloat(formMonto.value);
            const fechaManual = document.getElementById('formFechaManual').value;
            if (!nom || !mon) return;

            if(modoEdicionForm) { 
                await _supabase.from('clientes').update({ nombre: nom }).eq('id', pActivo.cliente_id); 
                await _supabase.from('prestamos').update({ monto_prestado: mon, tasa_interes: parseInt(formTasa.value), dias_gracia: parseInt(formGracia.value) }).eq('id', pActivo.id); 
                modalForm.close(); verHistorial(pActivo.id); 
            } else { 
                let fId = cid;
                if (!fId) { const { data: cl } = await _supabase.from('clientes').insert([{ nombre: nom, user_id: currentUser.id, cartera_id: idCarteraActual }]).select().single(); if (cl) fId = cl.id; }
                const obj = { cliente_id: fId, cartera_id: idCarteraActual, user_id: currentUser.id, monto_prestado: mon, tasa_interes: parseInt(formTasa.value), dias_gracia: parseInt(formGracia.value) };
                if (fechaManual) obj.created_at = fechaManual;
                await _supabase.from('prestamos').insert([obj]);
                modalForm.close(); cargarDatos(); 
            } 
        }

        async function buscarClientesExistentes(v) {
            const l = document.getElementById('listaSugerenciasClientes'); if (v.length < 2) { l.classList.add('hidden'); return; }
            clearTimeout(timeoutBusqueda); timeoutBusqueda = setTimeout(async () => {
                const { data: cl } = await _supabase.from('clientes').select('id, nombre').eq('cartera_id', idCarteraActual).ilike('nombre', `%${v}%`).limit(5);
                if (cl?.length) {
                    l.innerHTML = cl.map(c => `<div onclick="seleccionarCliente('${c.id}', '${c.nombre}')" class="p-4 hover:bg-emerald-50 cursor-pointer border-b text-[11px] font-black uppercase">${c.nombre}</div>`).join('');
                    l.classList.remove('hidden');
                } else l.classList.add('hidden');
            }, 300);
        }

        function seleccionarCliente(id, n) { document.getElementById('formNombre').value = n; document.getElementById('formClienteId').value = id; document.getElementById('listaSugerenciasClientes').classList.add('hidden'); }

        async function cargarCarteras() {
            const { data: c } = await _supabase.from('carteras').select('*');
            if (c?.length) {
                idCarteraActual = idCarteraActual || c[0].id;
                document.getElementById('selectCartera').innerHTML = c.map(x => `<option value="${x.id}" ${x.id === idCarteraActual ? 'selected' : ''}>${x.nombre}</option>`).join('');
                cargarDatos();
            } else {
                const { data: n } = await _supabase.from('carteras').insert([{ nombre: 'Principal', user_id: currentUser.id }]).select().single();
                if (n) { idCarteraActual = n.id; cargarCarteras(); }
            }
        }

        async function verHistorial(id) { 
            const { data: p } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('id', id).single(); 
            pActivo = p; const c = calcularSaldo(p);
            viewDashboard.classList.add('hidden'); viewHistorial.classList.remove('hidden');
            histNombre.innerText = p.clientes.nombre; histSaldo.innerText = `Saldo: $${c.capital.toFixed(2)}`;
            listaPagosHistorial.innerHTML = (p.pagos || []).sort((a,b) => new Date(b.fecha_pago) - new Date(a.fecha_pago)).map(pg => `
                <div class="bg-white p-5 rounded-3xl border flex justify-between items-center">
                    <div>
                        <p class="text-[9px] font-black text-slate-300 uppercase">${pg.fecha_pago}</p>
                        <p class="text-xl font-black">$${parseFloat(pg.monto_pagado).toFixed(2)} ${!pg.apply_interes ? '' : ''}</p>
                    </div>
                    <button onclick="abrirReciboVisual(${pg.monto_pagado}, '${pg.fecha_pago}')" class="text-emerald-500"><i class="ph-bold ph-whatsapp-logo text-2xl"></i></button>
                </div>`).join('');
        }

        async function abrirReciboVisual(m, fecha) {
            const p = pActivo; 
            reciboCliente.innerText = p.clientes.nombre; reciboMonto.innerText = `$${m.toFixed(2)}`;
            reciboFechaSimple.innerText = fecha;
            reciboSaldo.innerText = `$${calcularSaldo(p).capital.toFixed(2)}`;
            modalReciboImagen.showModal();
        }

        async function processAuth() {
            const e = authEmail.value, p = authPassword.value;
            if (isSignUpMode) { await _supabase.auth.signUp({ email: e, password: p, options: { data: { full_name: authName.value } } }); alert("Enviado"); }
            else { const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p }); if (error) authError.innerText = "Error"; }
        }

        function toggleAuthMode() { isSignUpMode = !isSignUpMode; document.getElementById('container-name').classList.toggle('hidden'); }
        async function handleLogout() { await _supabase.auth.signOut(); }
        function abrirModalNuevo() { modoEdicionForm = false; formNombre.value = ''; formMonto.value = ''; formFechaManual.value = ''; document.getElementById('formClienteId').value = ''; modalForm.showModal(); }
        function abrirModalEditar() { modoEdicionForm = true; formNombre.value = pActivo.clientes.nombre; formMonto.value = pActivo.monto_prestado; modalForm.showModal(); }
        function abrirModalPago(id) { pActivo = {id}; montoPago.value = ''; fechaPago.value = new Date().toISOString().split('T')[0]; modalPago.showModal(); }
        async function confirmarPago() { 
            const m = parseFloat(montoPago.value), f = fechaPago.value; if(!m || !f) return;
            await _supabase.from('pagos').insert([{ monto_pagado: m, fecha_pago: f, aplicar_interes: !checkTodoCapital.checked, prestamo_id: pActivo.id, user_id: currentUser.id }]);
            modalPago.close(); cargarDatos(); 
        }
        function filtrarTab(t) { tabActual = t; cargarDatos(); }
        function cerrarHistorial() { viewHistorial.classList.add('hidden'); viewDashboard.classList.remove('hidden'); cargarDatos(); }
        async function crearCartera() { const n = nombreNuevaCartera.value; if(n) await _supabase.from('carteras').insert([{ nombre: n, user_id: currentUser.id }]); modalCartera.close(); cargarCarteras(); }
        function cambiarCartera(id) { idCarteraActual = id; cargarDatos(); }
        window.onload = init;
    </script>
</body>
