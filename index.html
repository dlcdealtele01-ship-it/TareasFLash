    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .hidden { display: none !important; }
        dialog::backdrop { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04); }
        
        /* Animación de transición */
        .view-transition { animation: fadeInScale 0.3s ease-out; }
        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge-mora { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        label { display: block; text-align: left; font-weight: 800; text-transform: uppercase; font-size: 10px; color: #94a3b8; margin-bottom: 4px; margin-left: 8px; }
        .tab-active { border-bottom: 3px solid #10b981; color: #0f172a !important; }
        .select-none { user-select: none; -webkit-user-select: none; }
    </style>
</head>

    <script>
        let currentUser, idCarteraActual, pActivo, modoEdicionForm, idPagoAEditar, tabActual = 'activos', timerAdmin;

        // Formateador de Fecha Amigable (Día Mes Año)
        function formatFecha(fechaString) {
            if(!fechaString) return "-";
            const meses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
            const d = new Date(fechaString + "T12:00:00"); 
            return `${d.getDate().toString().padStart(2, '0')} ${meses[d.getMonth()]} ${d.getFullYear()}`;
        }

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                await cargarCarteras();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
            }
        }

        async function handleAuth(type) {
            const email = authEmail.value, password = authPassword.value;
            let res = type === 'signup' ? await _supabase.auth.signUp({email, password}) : await _supabase.auth.signInWithPassword({email, password});
            if (res.error) authError.innerText = res.error.message; else init();
        }

        async function handleLogout() { await _supabase.auth.signOut(); window.location.reload(); }

        async function cargarCarteras() {
            const { data: c } = await _supabase.from('carteras').select('*');
            if (c?.length) {
                idCarteraActual = idCarteraActual || c[0].id;
                document.getElementById('selectCartera').innerHTML = c.map(x => `<option value="${x.id}" ${x.id === idCarteraActual ? 'selected' : ''}>${x.nombre}</option>`).join('');
                cargarDatos();
            }
        }

        async function cargarDatos() {
            const { data: p } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('cartera_id', idCarteraActual);
            const tbody = document.getElementById('listaPrestamos'); tbody.innerHTML = '';
            let tCap = 0, tInt = 0;
            p?.forEach(x => {
                const calc = calcularSaldo(x); const esFin = calc.capital <= 0.05;
                if(!esFin) { tCap += calc.capital; tInt += calc.interes; }
                if ((tabActual === 'activos' && !esFin) || (tabActual === 'finalizados' && esFin)) {
                    const m = verificarMora(x.pagos, x.dias_gracia || 0);
                    tbody.innerHTML += `<tr class="border-b border-slate-50 cursor-pointer" onclick="verHistorial('${x.id}')">
                        <td class="p-6">${m && !esFin ? '<span class="badge-mora bg-red-100 text-red-600 text-[8px] font-black px-2 py-0.5 rounded-full block w-fit mb-1 uppercase">Mora</span>' : ''}
                        <div class="font-black uppercase text-sm text-slate-700">${x.clientes.nombre}</div></td>
                        <td class="p-6 text-right"><div class="font-black text-lg">$${calc.capital.toFixed(2)}</div></td>
                        <td class="p-6 text-center" onclick="event.stopPropagation()">
                        ${!esFin ? `<button onclick="abrirModalPago('${x.id}')" class="w-10 h-10 bg-emerald-500 text-white rounded-xl mx-auto flex items-center justify-center"><i class="ph-bold ph-hand-coins"></i></button>` : '<i class="ph-bold ph-check-circle text-emerald-500 text-2xl"></i>'}</td></tr>`;
                }
            });
            totalCapital.innerText = `$${tCap.toFixed(2)}`; totalIntereses.innerText = `$${tInt.toFixed(2)}`;
        }

        function iniciarPresionAdmin() { timerAdmin = setTimeout(() => { inputPinAdmin.value = ""; modalPinAdmin.showModal(); }, 2000); }
        function cancelarPresionAdmin() { clearTimeout(timerAdmin); }
        async function validarPinAdmin() { if (inputPinAdmin.value === '1234') { modalPinAdmin.close(); abrirPapelera(); } else { alert("PIN Erróneo"); } }

        async function abrirPapelera() {
            const { data: items } = await _supabase.from('papelera').select('*').order('created_at', { ascending: false });
            listaPapelera.innerHTML = items?.length ? '' : '<p class="text-center text-slate-400 font-bold py-10 uppercase text-[10px]">Vacía</p>';
            items?.forEach(i => {
                listaPapelera.innerHTML += `<div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center border">
                    <div><p class="text-[8px] font-black uppercase text-blue-500">${i.tipo}</p><p class="text-xs font-bold text-slate-700">${i.tipo === 'pago' ? '$'+i.datos.monto_pagado : (i.datos.clientes?.nombre || 'Préstamo')}</p></div>
                    <button onclick="restaurarItem('${i.id}')" class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Restaurar</button></div>`;
            });
            modalPapelera.showModal();
        }

        async function restaurarItem(pid) {
            const { data: i } = await _supabase.from('papelera').select('*').eq('id', pid).single();
            await _supabase.from(i.tipo === 'pago' ? 'pagos' : 'prestamos').insert([i.datos]);
            await _supabase.from('papelera').delete().eq('id', pid);
            modalPapelera.close(); cargarDatos();
        }

        function abrirModalPago(id) { 
            pActivo = {id: id}; idPagoAEditar = null; 
            montoPago.value = ""; fechaPago.value = new Date().toISOString().split('T')[0];
            modalPago.showModal(); 
        }

        async function confirmarPago() {
            const m = parseFloat(montoPago.value), f = fechaPago.value, a = !checkTodoCapital.checked;
            const obj = { monto_pagado: m, aplicar_interes: a, fecha_pago: f, user_id: currentUser.id };
            if(idPagoAEditar) await _supabase.from('pagos').update(obj).eq('id', idPagoAEditar);
            else await _supabase.from('pagos').insert([{ ...obj, prestamo_id: pActivo.id }]);
            modalPago.close(); 
            if(pActivo.id) await verHistorial(pActivo.id); else cargarDatos();
            if(!idPagoAEditar) abrirReciboVisual(m, a, f);
        }

        async function verHistorial(id) {
            const { data: p } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('id', id).single();
            pActivo = p; const calc = calcularSaldo(p);
            
            // Efecto Visual de Transición
            viewDashboard.classList.add('hidden'); 
            viewHistorial.classList.remove('hidden');
            
            histNombre.innerText = p.clientes.nombre; histSaldo.innerText = `$${calc.capital.toFixed(2)}`;
            listaPagosHistorial.innerHTML = p.pagos.sort((a,b)=>new Date(b.fecha_pago)-new Date(a.fecha_pago)).map(pg => `
                <div class="bg-white p-5 rounded-[2rem] border flex justify-between items-center shadow-sm">
                    <div><p class="text-[9px] font-black text-slate-400 uppercase">${formatFecha(pg.fecha_pago)}</p><p class="text-xl font-black">$${parseFloat(pg.monto_pagado).toFixed(2)}</p></div>
                    <div class="flex gap-1">
                        <button onclick="abrirReciboHistorial('${pg.id}')" title="Comprobante" class="text-emerald-500 p-2"><i class="ph-bold ph-whatsapp-logo text-2xl"></i></button>
                        <button onclick="editarPago('${pg.id}', ${pg.monto_pagado}, '${pg.fecha_pago}', ${pg.aplicar_interes})" class="text-blue-400 p-2"><i class="ph-bold ph-pencil-simple text-2xl"></i></button>
                        <button onclick="eliminarPago('${pg.id}')" class="text-red-200 p-2"><i class="ph-bold ph-trash text-2xl"></i></button>
                    </div></div>`).join('');
        }

        async function eliminarPago(id) {
            if(confirm("¿Enviar este pago a la papelera?")) {
                const { data: p } = await _supabase.from('pagos').select('*').eq('id', id).single();
                await _supabase.from('papelera').insert([{ tipo: 'pago', datos: p, user_id: currentUser.id }]);
                await _supabase.from('pagos').delete().eq('id', id);
                verHistorial(pActivo.id);
            }
        }

        async function eliminarPrestamoCompleto() {
            if(confirm("¿Eliminar Préstamo? Se enviará a la papelera.")) {
                const { data: p } = await _supabase.from('prestamos').select('*').eq('id', pActivo.id).single();
                await _supabase.from('papelera').insert([{ tipo: 'prestamo', datos: p, user_id: currentUser.id }]);
                await _supabase.from('prestamos').delete().eq('id', pActivo.id);
                cerrarHistorial();
            }
        }

        function editarPago(id, m, f, a) { idPagoAEditar = id; montoPago.value = m; fechaPago.value = f; checkTodoCapital.checked = !a; modalPago.showModal(); }

        function calcularSaldo(p) {
            let c = parseFloat(p.monto_prestado), t = p.tasa_interes / 100;
            (p.pagos || []).sort((a,b)=>new Date(a.fecha_pago)-new Date(b.fecha_pago)).forEach(x => {
                const m = parseFloat(x.monto_pagado); if(x.aplicar_interes) { const i = c * t; if(m >= i) c -= (m - i); } else c -= m;
            }); return { capital: Math.max(0, c), interes: Math.max(0, c * t) };
        }

        function verificarMora(pgs, g) {
            const h = new Date(), d = h.getDate(), l15 = 15+parseInt(g), l30 = 30+parseInt(g), chk = d > l30 ? 30 : (d > l15 ? 15 : 0);
            if(!chk) return false; return !pgs?.some(x => { const f = new Date(x.fecha_pago); return f.getUTCMonth() === h.getUTCMonth() && f.getUTCDate() >= (chk === 15 ? 1 : 16); });
        }

        async function abrirReciboHistorial(pagoId) {
            const pg = pActivo.pagos.find(x => x.id === pagoId);
            if(pg) abrirReciboVisual(pg.monto_pagado, pg.aplicar_interes, pg.fecha_pago);
        }

        async function abrirReciboVisual(montoP, aplicaInt, fechaP) {
            const { data: p } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('id', pActivo.id).single();
            let capPrevio = parseFloat(p.monto_prestado), tD = p.tasa_interes / 100;
            const pagosOrdenados = p.pagos.sort((a,b) => new Date(a.fecha_pago) - new Date(b.fecha_pago));
            
            pagosOrdenados.forEach(pg => {
                if(new Date(pg.fecha_pago) < new Date(fechaP)) {
                    const ma = parseFloat(pg.monto_pagado);
                    if (pg.aplicar_interes) { const i = capPrevio * tD; if (ma >= i) capPrevio -= (ma - i); } else capPrevio -= ma;
                }
            });

            const interesPagado = aplicaInt ? Math.min(montoP, capPrevio * tD) : 0;
            const abonoCapital = aplicaInt ? Math.max(0, montoP - (capPrevio * tD)) : montoP;
            const saldoFinal = Math.max(0, capPrevio - abonoCapital);

            reciboCliente.innerText = p.clientes.nombre; 
            reciboMonto.innerText = `$${parseFloat(montoP).toFixed(2)}`; 
            reciboInteres.innerText = `$${interesPagado.toFixed(2)}`; 
            reciboAbonoCapital.innerText = `$${abonoCapital.toFixed(2)}`;
            reciboFechaSimple.innerText = formatFecha(fechaP); 
            reciboSaldo.innerText = `$${saldoFinal.toFixed(2)}`;
            
            modalReciboImagen.showModal();
            btnCompartirWA.onclick = async () => {
                const canvas = await html2canvas(areaRecibo, { backgroundColor: '#F8FAFC', scale: 2 });
                canvas.toBlob(async b => { const f = new File([b], 'Recibo.png', {type:'image/png'}); if(navigator.share) await navigator.share({files:[f]}); });
            };
        }

        function abrirModalNuevo() { modoEdicionForm = false; formNombre.value = ''; formMonto.value = ''; modalForm.showModal(); }
        function abrirModalEditar() { modoEdicionForm = true; formNombre.value = pActivo.clientes.nombre; formMonto.value = pActivo.monto_prestado; modalForm.showModal(); }
        async function guardarPrestamo() {
            const dat = { monto_prestado: parseFloat(formMonto.value), tasa_interes: parseInt(formTasa.value), dias_gracia: parseInt(formGracia.value) };
            if(modoEdicionForm) {
                await _supabase.from('clientes').update({ nombre: formNombre.value }).eq('id', pActivo.cliente_id);
                await _supabase.from('prestamos').update(dat).eq('id', pActivo.id);
                modalForm.close(); verHistorial(pActivo.id);
            } else {
                const { data: cl } = await _supabase.from('clientes').insert([{ nombre: formNombre.value, user_id: currentUser.id, cartera_id: idCarteraActual }]).select().single();
                await _supabase.from('prestamos').insert([{ ...dat, cliente_id: cl.id, user_id: currentUser.id, cartera_id: idCarteraActual }]);
                modalForm.close(); cargarDatos();
            }
        }

        async function crearCartera() { if(!nombreNuevaCartera.value) return; await _supabase.from('carteras').insert([{ nombre: nombreNuevaCartera.value, user_id: currentUser.id }]); modalCartera.close(); cargarCarteras(); }
        function cerrarHistorial() { viewHistorial.classList.add('hidden'); viewDashboard.classList.remove('hidden'); cargarDatos(); }
        function filtrarTab(t) { tabActual = t; cargarDatos(); }
        function cambiarCartera(id) { idCarteraActual = id; cargarDatos(); }

        window.onload = init;
    </script>
</body>
